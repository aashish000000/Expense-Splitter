<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Details - Expense Splitter</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .main-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    .group-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 20px;
    }
    .group-header h1 {
      margin: 0;
    }
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .form-row input {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .chat-button {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div class="main-container">
    <a href="home.html" class="back-link">
      <img src="img/back.svg" width="20" height="20" alt="Back">
      Back to Groups
    </a>

    <h2>Group Details</h2>
    <div class="group-header">
      <h1 id="gname">Loading...</h1>
      <img src="img/edit.svg" id="edit-btn" class="icon-btn" width="28" height="28" title="Edit">
      <img src="img/delete.svg" id="deleteExpenseButton" class="icon-btn" width="28" height="28" title="Delete">
    </div>

    <div class="card">
      <h3>Members</h3>
      <ul id="users"></ul>
    </div>

    <div class="card">
      <h3>Add Expense</h3>
      <div class="form-row">
        <input type="text" id="expenseName" placeholder="Expense name" required>
        <input type="number" id="expenseAmount" placeholder="Amount" step="0.01" required>
        <div class="btn-group">
          <button id="addExpenseButton" class="btn">Add Expense</button>
          <button id="iPaidButton" class="btn btn-success">I Paid</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h3>Expenses</h3>
      <ul id="expensesList"></ul>
    </div>

    <button id="chatButton" class="btn chat-button">💬 Chat</button>

    <div id="chatModal" class="chat-modal">
      <div class="chat-modal-content">
        <span id="closeChatModal" class="close">&times;</span>
        <h3>Group Chat</h3>
        <div id="chatMessages" class="chat-messages"></div>
        <input type="text" id="chatInput" placeholder="Type a message..." class="form-group">
        <button id="sendChatButton" class="btn">Send</button>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/group-details.js"></script>
</body>
</html>
