<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Splitter</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }
    .landing h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    .landing p {
      color: var(--text-light);
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    .button-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="landing">
    <h1>Expense Splitter</h1>
    <p>Split expenses with friends and groups easily.</p>
    <div class="button-group">
      <a href="login.html" class="btn">Login</a>
      <a href="register.html" class="btn btn-success">Register</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
  <script>Auth.redirectIfLoggedIn();</script>
</body>
</html>
